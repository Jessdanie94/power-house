<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power House Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-top: 0; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px 0; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; }
        .status { color: #4ade80; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Power House <span style="color: #38bdf8;">Control Center</span></h1>
            <div class="status">SYSTEM ONLINE</div>
        </header>
        
        <div class="grid">
            <div class="card">
                <h2>Product Catalog</h2>
                <ul id="product-list">Loading...</ul>
            </div>
            <div class="card">
                <h2>Saskatchewan Sales</h2>
                <ul id="sales-list">Loading...</ul>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const prodRes = await fetch('/api/products');
                const products = await prodRes.json();
                document.getElementById('product-list').innerHTML = products.map(p => 
                    `<li><span>${p.name}</span> <span style="color: #94a3b8">$${p.price}</span></li>`
                ).join('');

                const salesRes = await fetch('/api/recent-sales');
                const sales = await salesRes.json();
                document.getElementById('sales-list').innerHTML = sales.map(s => 
                    `<li><span>${s.customer}</span> <span style="color: #fbbf24">$${s.amount}</span></li>`
                ).join('');
            } catch (err) {
                console.error('Error loading dashboard data:', err);
            }
        }
        loadData();
    </script>
</body>
</html>

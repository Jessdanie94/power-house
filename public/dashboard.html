<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDV | Power House Command</title>
    <style>
        :root {
            --neon-blue: #38bdf8;
            --neon-green: #10b981;
            --neon-gold: #fbbf24;
            --neon-red: #ef4444;
            --bg-dark: #09090b;
            --card-bg: #18181b;
            --border: #27272a;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-dark); color: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; }
        .card { background: var(--card-bg); padding: 24px; border-radius: 16px; border: 1px solid var(--border); transition: all 0.3s ease; position: relative; overflow: hidden; }
        .card:hover { border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(56, 189, 248, 0.1); }
        h2 { color: var(--neon-blue); margin-top: 0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 12px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        li:last-child { border-bottom: none; }
        .status { color: var(--neon-green); font-weight: bold; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; }
        .pulse { width: 8px; height: 8px; background: var(--neon-green); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 1; } 70% { transform: scale(1.5); opacity: 0; } 100% { transform: scale(0.95); opacity: 0; } }
        
        .vault-value { font-size: 2.5rem; font-weight: 900; font-family: monospace; color: #fff; letter-spacing: -2px; }
        .vault-label { font-size: 0.6rem; color: #71717a; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        
        .tier { font-size: 0.6rem; padding: 2px 8px; border-radius: 100px; font-weight: 900; letter-spacing: 1px; }
        .tier-INITIATE { color: #94a3b8; border: 1px solid #94a3b8; }
        .tier-SENTRY { color: var(--neon-green); border: 1px solid var(--neon-green); }
        .tier-ELITE { color: var(--neon-blue); border: 1px solid var(--neon-blue); }
        .tier-ARCHITECT { color: var(--neon-gold); border: 1px solid var(--neon-gold); }

        .token { font-family: monospace; color: #71717a; font-size: 0.75rem; margin-top: 4px; }
        .count { font-size: 1.25rem; font-weight: 800; color: #fff; }
        .rank { font-size: 1.5rem; font-weight: 900; color: var(--border); margin-right: 15px; }
        .glow-overlay { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(56,189,248,0.03) 0%, transparent 70%); pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 style="margin:0; font-size: 1.5rem; font-weight: 900; letter-spacing: -1px;">JDV <span style="color: var(--neon-blue);">SENTRY CORE</span></h1>
            <div class="status"><div class="pulse"></div> ULTRA-SENTRY MODE ACTIVE</div>
        </header>
        
        <div class="grid">
            <!-- VAULT FUNDING CARD -->
            <div class="card" style="border-color: var(--neon-gold); grid-column: span 1;">
                <div class="glow-overlay"></div>
                <h2>💰 Vault Funding</h2>
                <div class="vault-value" id="vault-total">CA/tmp/tmpmvrgovjc.sh.00</div>
                <div class="vault-label">Accumulated Capital in Vault</div>
                <div style="margin-top: 20px; font-size: 0.7rem; display: flex; justify-content: space-between;">
                    <span id="conversions-count" style="color: var(--neon-blue);">0 Deployments</span>
                    <span id="growth-status" style="color: var(--neon-green);">OPERATIONAL</span>
                </div>
            </div>

            <div class="card">
                <h2>📦 Product Inventory</h2>
                <ul id="product-list"></ul>
            </div>

            <div class="card" style="border-color: var(--neon-green);">
                <h2>🔥 Referral Leaderboard</h2>
                <ul id="leaderboard-list"></ul>
            </div>
            
            <div class="card">
                <h2>🛰️ Regional Telemetry</h2>
                <ul id="sales-list"></ul>
            </div>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                // 1. Telemetry / Vault Update
                const telRes = await fetch('/api/telemetry');
                const tel = await telRes.json();
                document.getElementById('vault-total').innerText = 'CA$' + tel.totalFunding.toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('conversions-count').innerText = tel.conversions + ' Deployments';
                document.getElementById('growth-status').innerText = tel.status;

                // 2. Leaderboard Update
                const leaderRes = await fetch('/api/growth/leaderboard');
                const leaders = await leaderRes.json();
                document.getElementById('leaderboard-list').innerHTML = leaders.length ? leaders.map(l => `
                    <li>
                        <div style="display: flex; align-items: center;">
                            <span class="rank">#${l.rank}</span>
                            <div>
                                <div style="font-weight: 700; font-size: 0.9rem;">${l.identity}</div>
                                <div class="token">${l.token}</div>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div class="tier tier-${l.tier}">${l.tier}</div>
                            <div class="count">${l.count}</div>
                        </div>
                    </li>
                `).join('') : '<li style=\"color: #71717a;\">No viral activity detected.</li>';

                // 3. Products
                const prodRes = await fetch('/api/products');
                const prodData = await prodRes.json();
                const products = prodData.products || prodData;
                document.getElementById('product-list').innerHTML = products.map(p => `
                    <li>
                        <span>${p.name}</span>
                        <span style="font-weight: 800; color: var(--neon-gold); font-family: monospace;">$${p.price}</span>
                    </li>
                `).join('');

                // 4. Social Proof
                const salesRes = await fetch('/api/social-proof/live-signals');
                const sales = await salesRes.json();
                document.getElementById('sales-list').innerHTML = sales.length ? sales.map(s => `
                    <li>
                        <div style="display: flex; align-items: center; gap: 8px;">
                           <div style="width: 6px; height: 6px; background: var(--neon-green); border-radius: 50%;"></div>
                           <span style="font-weight: 700; font-size: 0.9rem;">${s.identity}</span>
                        </div>
                        <span style="color: #71717a; font-size: 0.8rem;">${s.event} ${s.target}</span>
                    </li>
                `).join('') : '<li style=\"color: #71717a;\">Scanning for signals...</li>';

            } catch (err) {
                console.error('[Sentry Error] Dashboard sync failed:', err);
            }
        }
        updateDashboard();
        setInterval(updateDashboard, 10000); 
    </script>
</body>
</html>

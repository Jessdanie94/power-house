name: JDV Repository Sentry

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  sentry-scan:
    name: Security & Health Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
      uses: actions/checkout@v4

      - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

      - name: Install Dependencies
      run: npm install

      - name: Build Check (CSS)
      run: npx tailwindcss -i ./public/global.css -o ./public/dist.css

      - name: Lint & Security Audit
      run: npm audit --audit-level=high

  secret-scanner:
    name: Secret Leak Prevention
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      - name: Gitleaks Scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

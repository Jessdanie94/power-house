name: Shopify API Check

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  shopify-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SHOPIFY_ADMIN_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ADMIN_ACCESS_TOKEN }}
      SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
      SHOPIFY_API_VERSION: ${{ secrets.SHOPIFY_API_VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci || npm i

      - name: Run Shopify REST smoke test
        run: node testShopifyRest.js

      - name: Run Shopify smoke test (safe client)
        run: node testShopifySafeClient.js

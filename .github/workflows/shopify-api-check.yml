name: Shopify API Check

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 6 * * *'

jobs:
  shopify-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SHOPIFY_ADMIN_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ADMIN_ACCESS_TOKEN }}
      SHOPIFY_STORE_DOMAIN: jessesdigitalventures.myshopify.com
      SHOPIFY_API_VERSION: "2026-04"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci || npm i

      - name: Validate Environment
        run: node validateEnv.js

      - name: Run Shopify REST smoke test
        run: node testShopifyRest.js

      - name: Run Shopify SafeClient smoke test
        run: node testShopifySafeClient.js

      - name: Sovereign Finality Check
        run: echo "JDV Sovereign Finality - All systems nominal."
